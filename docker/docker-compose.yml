services:
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    env_file:
      - ./../.env
    ports:
      # Expose Apache from the container to the host machine
      - "${APP_PORT:-8080}:80"
    volumes:
      # Mount the project source code into the container
      - ./..:/var/www/html
    environment:
      # Application settings
      APP_URL: ${APP_URL}

      # Database connection settings for the PHP app
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      # Start the database container before the app container
      - db

  db:
    # Use the current MySQL LTS branch
    image: mysql:8.4
    restart: unless-stopped
    ports:
      # Expose MySQL to the host machine for local access
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    environment:
      # Initial database and user configuration
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      # Persist database data between container restarts
      - db_data:/var/lib/mysql

volumes:
  # Named volume for persistent MySQL storage
  db_data: